spring:
  application:
    name: shopping-api

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:shopping}?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: ShoppingHikariPool

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      connect-timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

aws:
  region: ${AWS_REGION:us-east-1}
  sqs:
    endpoint: ${SQS_ENDPOINT:}
    queue-url: ${SQS_QUEUE_URL:http://localhost:4566/000000000000/order-processing-queue}
    consumer:
      max-messages: 10
      wait-time-seconds: 20

app:
  lock:
    ttl-ms: 5000
    retry-times: 3
    retry-interval-ms: 100
  tcc:
    try-expire-minutes: 5
    cleanup-interval-ms: 60000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      cloudwatch:
        namespace: Shopping/API
        enabled: ${CLOUDWATCH_METRICS_ENABLED:false}
        step: 1m

logging:
  level:
    com.shop: INFO
    org.mybatis: WARN
    com.zaxxer.hikari: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
